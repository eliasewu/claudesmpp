group = sqlbox
id = sqlbox-1
bearerbox-host = localhost
bearerbox-port = 13001
smsbox-port = 13005
global-sender = "SMS-GW"
log-file = /var/log/kannel/sqlbox.log
log-level = 0

group = mysql-connection
id = myconn
host = mysql
port = 3306
username = kannel
password = kannelpass123
database = kannel
max-connections = 20
connect-attempts = 5
connect-delay = 10

group = mysql-table
id = sent_sms
connection = myconn
table = messages
field-mo-id = id
field-mo-foreign-id = messageId
field-mo-sender = `from`
field-mo-receiver = `to`
field-mo-msgdata = content
field-mo-time = submittedAt

group = mysql-table
id = dlr
connection = myconn
table = dlr_records
field-dlr-id = id
field-dlr-foreign-id = messageId
field-dlr-mask = statusMask
field-dlr-url = dlrUrl
field-dlr-boxc-id = boxcId
